<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLOv8 Object Detection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #8b949e;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed #30363d;
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #161b22;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #58a6ff;
            background: #1a2332;
        }

        .upload-area.has-file {
            border-color: #3fb950;
            border-style: solid;
            padding: 30px 40px;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .upload-text {
            font-size: 1.1rem;
            color: #8b949e;
        }

        .upload-text strong {
            color: #58a6ff;
        }

        input[type="file"] { display: none; }

        /* Video Info */
        .video-info {
            display: none;
            margin-top: 20px;
            padding: 16px 20px;
            background: #1c2129;
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        .video-info .meta {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .video-info .meta span {
            color: #8b949e;
            font-size: 0.9rem;
        }

        .video-info .meta span strong {
            color: #e1e4e8;
        }

        /* Detect Button */
        .detect-btn {
            display: none;
            width: 100%;
            margin-top: 20px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #238636, #2ea043);
            color: white;
            transition: all 0.3s;
        }

        .detect-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #2ea043, #3fb950);
            transform: translateY(-1px);
        }

        .detect-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Progress */
        .progress-section {
            display: none;
            margin-top: 24px;
        }

        .progress-bar-container {
            background: #21262d;
            border-radius: 8px;
            overflow: hidden;
            height: 12px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            border-radius: 8px;
            transition: width 0.3s;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #8b949e;
            font-size: 0.9rem;
        }

        /* Results */
        .results-section {
            display: none;
            margin-top: 32px;
        }

        .results-section h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #58a6ff;
        }

        .result-video {
            width: 100%;
            border-radius: 12px;
            background: #000;
            margin-bottom: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #58a6ff;
        }

        .stat-card .label {
            font-size: 0.8rem;
            color: #8b949e;
            margin-top: 4px;
        }

        .objects-table {
            width: 100%;
            border-collapse: collapse;
            background: #161b22;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #30363d;
        }

        .objects-table th {
            background: #1c2129;
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #8b949e;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .objects-table td {
            padding: 10px 16px;
            border-top: 1px solid #21262d;
        }

        .objects-table tr:hover td {
            background: #1c2129;
        }

        .count-bar {
            display: inline-block;
            height: 8px;
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            border-radius: 4px;
            margin-right: 10px;
            vertical-align: middle;
        }

        .download-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background: #21262d;
            color: #58a6ff;
            border: 1px solid #30363d;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .download-btn:hover {
            background: #30363d;
        }

        .reset-btn {
            display: inline-block;
            margin-top: 20px;
            margin-left: 12px;
            padding: 12px 28px;
            background: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .reset-btn:hover {
            color: #e1e4e8;
            border-color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>YOLOv8 Object Detection</h1>
        <p class="subtitle">Upload a video and detect every object using the COCO-trained YOLOv8 model</p>

        <!-- Upload -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">&#128249;</div>
            <p class="upload-text">Drag & drop your video here or <strong>click to browse</strong></p>
            <p style="color: #484f58; margin-top: 8px; font-size: 0.85rem;">Supports MP4, AVI, MOV, MKV, WebM (max 500MB)</p>
        </div>
        <input type="file" id="fileInput" accept="video/*">

        <!-- Video Info -->
        <div class="video-info" id="videoInfo">
            <div class="meta" id="videoMeta"></div>
        </div>

        <!-- Detect Button -->
        <button class="detect-btn" id="detectBtn" onclick="runDetection()">
            Detect All Objects
        </button>

        <!-- Progress -->
        <div class="progress-section" id="progressSection">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <p class="progress-text" id="progressText">Processing frames...</p>
        </div>

        <!-- Results -->
        <div class="results-section" id="resultsSection">
            <h2>Detection Results</h2>
            <video class="result-video" id="resultVideo" controls></video>
            <div class="stats-grid" id="statsGrid"></div>
            <table class="objects-table">
                <thead>
                    <tr>
                        <th>Object Class</th>
                        <th>Detections</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="objectsBody"></tbody>
            </table>
            <a class="download-btn" id="downloadBtn" download>Download Annotated Video</a>
            <button class="reset-btn" onclick="resetAll()">Upload Another Video</button>
        </div>
    </div>

    <script>
        let currentJobId = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) handleFile(fileInput.files[0]);
        });

        async function handleFile(file) {
            uploadArea.classList.add('has-file');
            uploadArea.innerHTML = `
                <div class="upload-icon">&#127916;</div>
                <p class="upload-text"><strong>${file.name}</strong></p>
                <p style="color: #8b949e; margin-top: 4px; font-size: 0.9rem;">${(file.size / 1024 / 1024).toFixed(1)} MB — uploading...</p>
            `;

            const formData = new FormData();
            formData.append('video', file);

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.error) {
                    uploadArea.innerHTML = `<p style="color: #f85149;">${data.error}</p>`;
                    return;
                }

                currentJobId = data.job_id;

                uploadArea.querySelector('p:last-child').textContent = `${(file.size / 1024 / 1024).toFixed(1)} MB — uploaded`;

                const videoInfo = document.getElementById('videoInfo');
                videoInfo.style.display = 'block';
                document.getElementById('videoMeta').innerHTML = `
                    <span>Resolution: <strong>${data.resolution}</strong></span>
                    <span>Duration: <strong>${data.duration}</strong></span>
                    <span>FPS: <strong>${data.fps}</strong></span>
                    <span>Frames: <strong>${data.total_frames}</strong></span>
                `;

                document.getElementById('detectBtn').style.display = 'block';
            } catch (err) {
                uploadArea.innerHTML = `<p style="color: #f85149;">Upload failed: ${err.message}</p>`;
            }
        }

        async function runDetection() {
            const btn = document.getElementById('detectBtn');
            btn.disabled = true;
            btn.textContent = 'Processing...';

            const progressSection = document.getElementById('progressSection');
            progressSection.style.display = 'block';

            // Poll progress
            const pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/progress/${currentJobId}`);
                    const data = await res.json();
                    const pct = data.progress;
                    document.getElementById('progressBar').style.width = pct + '%';
                    document.getElementById('progressText').textContent = `Processing frames... ${pct}%`;
                } catch (e) {}
            }, 500);

            try {
                const res = await fetch(`/detect/${currentJobId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ conf: 0.25, model: 'yolov8s.pt' })
                });
                const data = await res.json();

                clearInterval(pollInterval);

                if (data.error) {
                    document.getElementById('progressText').textContent = `Error: ${data.error}`;
                    btn.disabled = false;
                    btn.textContent = 'Retry Detection';
                    return;
                }

                document.getElementById('progressBar').style.width = '100%';
                document.getElementById('progressText').textContent = `Done in ${data.processing_time} (${data.processing_fps} fps)`;

                showResults(data);
            } catch (err) {
                clearInterval(pollInterval);
                document.getElementById('progressText').textContent = `Error: ${err.message}`;
                btn.disabled = false;
                btn.textContent = 'Retry Detection';
            }
        }

        function showResults(data) {
            const resultsSection = document.getElementById('resultsSection');
            resultsSection.style.display = 'block';

            const videoUrl = `/output/${data.output_video}`;
            const resultVideo = document.getElementById('resultVideo');
            resultVideo.src = videoUrl;

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="value">${data.unique_classes}</div>
                    <div class="label">Object Classes</div>
                </div>
                <div class="stat-card">
                    <div class="value">${data.total_detections.toLocaleString()}</div>
                    <div class="label">Total Detections</div>
                </div>
                <div class="stat-card">
                    <div class="value">${data.processing_time}</div>
                    <div class="label">Processing Time</div>
                </div>
                <div class="stat-card">
                    <div class="value">${data.processing_fps}</div>
                    <div class="label">Processing FPS</div>
                </div>
            `;

            const maxCount = data.objects.length > 0 ? data.objects[0].count : 1;
            const tbody = document.getElementById('objectsBody');
            tbody.innerHTML = data.objects.map(obj => `
                <tr>
                    <td>${obj.name}</td>
                    <td>${obj.count.toLocaleString()}</td>
                    <td><span class="count-bar" style="width: ${Math.max(4, (obj.count / maxCount) * 200)}px"></span></td>
                </tr>
            `).join('');

            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.href = videoUrl;

            document.getElementById('detectBtn').style.display = 'none';

            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        function resetAll() {
            currentJobId = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('uploadArea').classList.remove('has-file');
            document.getElementById('uploadArea').innerHTML = `
                <div class="upload-icon">&#128249;</div>
                <p class="upload-text">Drag & drop your video here or <strong>click to browse</strong></p>
                <p style="color: #484f58; margin-top: 8px; font-size: 0.85rem;">Supports MP4, AVI, MOV, MKV, WebM (max 500MB)</p>
            `;
            document.getElementById('videoInfo').style.display = 'none';
            document.getElementById('detectBtn').style.display = 'none';
            document.getElementById('detectBtn').disabled = false;
            document.getElementById('detectBtn').textContent = 'Detect All Objects';
            document.getElementById('progressSection').style.display = 'none';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('resultsSection').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
